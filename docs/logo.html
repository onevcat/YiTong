<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YiTong Logo</title>
  <script>
    (() => {
      const theme = new URLSearchParams(window.location.search).get("theme");
      if (theme === "dark" || theme === "light") {
        document.documentElement.dataset.theme = theme;
      }
    })();
  </script>
  <style>
    :root {
      --paper: #f6f1e8;
      --ink: #141414;
      --muted: #665f57;
      --addition: #1d9b63;
      --addition-soft: #dff5e9;
      --deletion: #d14b57;
      --deletion-soft: #fde6e8;
      --stroke: rgba(20, 20, 20, 0.12);
      --shadow: 0 24px 60px rgba(20, 20, 20, 0.12);
      --tile-white: #ffffff;
      --body-highlight-addition: rgba(29, 155, 99, 0.16);
      --body-highlight-deletion: rgba(209, 75, 87, 0.16);
      --body-background: linear-gradient(180deg, #fcfaf5 0%, #eee6da 100%);
      --logo-background: rgba(255, 255, 255, 0.72);
      --mark-background: linear-gradient(145deg, rgba(29, 155, 99, 0.16) 0%, rgba(29, 155, 99, 0.02) 36%, rgba(209, 75, 87, 0.02) 64%, rgba(209, 75, 87, 0.16) 100%);
      --rail-shadow: inset 0 0 0 1px rgba(20, 20, 20, 0.06);
      --rail-minus-background: linear-gradient(180deg, var(--deletion-soft) 0%, rgba(209, 75, 87, 0.12) 100%);
      --rail-plus-background: linear-gradient(180deg, var(--addition-soft) 0%, rgba(29, 155, 99, 0.12) 100%);
      --content-background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.94)),
        repeating-linear-gradient(
          180deg,
          rgba(20, 20, 20, 0.015) 0,
          rgba(20, 20, 20, 0.015) 1px,
          transparent 1px,
          transparent 36px
        );
      --blockquote-background: rgba(20, 20, 20, 0.04);
    }

    :root[data-theme="dark"] {
      --paper: #111215;
      --ink: #f4f2ec;
      --muted: #b7b2a8;
      --addition: #2ea36f;
      --addition-soft: rgba(57, 201, 131, 0.18);
      --deletion: #d85a66;
      --deletion-soft: rgba(255, 107, 119, 0.18);
      --stroke: rgba(255, 255, 255, 0.12);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.38);
      --tile-white: #f3efe7;
      --body-highlight-addition: rgba(57, 201, 131, 0.18);
      --body-highlight-deletion: rgba(255, 107, 119, 0.18);
      --body-background: linear-gradient(180deg, #0b0c0e 0%, #17191d 100%);
      --logo-background: rgba(18, 19, 23, 0.82);
      --mark-background: linear-gradient(145deg, rgba(46, 163, 111, 0.12) 0%, rgba(46, 163, 111, 0.025) 36%, rgba(216, 90, 102, 0.025) 64%, rgba(216, 90, 102, 0.12) 100%);
      --rail-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      --rail-minus-background: linear-gradient(180deg, rgba(255, 107, 119, 0.24) 0%, rgba(255, 107, 119, 0.08) 100%);
      --rail-plus-background: linear-gradient(180deg, rgba(57, 201, 131, 0.24) 0%, rgba(57, 201, 131, 0.08) 100%);
      --content-background:
        linear-gradient(180deg, rgba(24, 25, 30, 0.92), rgba(18, 19, 23, 0.96)),
        repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.028) 0,
          rgba(255, 255, 255, 0.028) 1px,
          transparent 1px,
          transparent 36px
        );
      --blockquote-background: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, var(--body-highlight-addition), transparent 30%),
        radial-gradient(circle at bottom right, var(--body-highlight-deletion), transparent 28%),
        var(--body-background);
      color: var(--ink);
      font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      padding: 32px;
    }

    .logo {
      width: min(920px, 100%);
      border-radius: 32px;
      border: 1px solid var(--stroke);
      background: var(--logo-background);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      gap: 0;
      min-height: 360px;
    }

    .mark {
      position: relative;
      background: var(--mark-background);
      border-right: 1px solid var(--stroke);
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .glyph {
      width: 220px;
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
    }

    .tile-mark {
      width: 100%;
      height: auto;
      filter:
        drop-shadow(0 18px 28px rgba(20, 20, 20, 0.12))
        drop-shadow(0 2px 0 rgba(255, 255, 255, 0.5));
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 44px 48px;
      gap: 16px;
      background: var(--content-background);
    }

    .title-group {
      display: inline-grid;
      grid-template-columns: auto auto;
      column-gap: 10px;
      row-gap: 6px;
      align-items: center;
      justify-content: start;
      justify-items: center;
    }

    .title-group .latin {
      font-size: clamp(52px, 8vw, 96px);
      line-height: 0.96;
      letter-spacing: -0.03em;
      font-weight: 600;
      font-family: "Optima", "Avenir Next", "Helvetica Neue", sans-serif;
    }

    .title-group .han {
      font-size: clamp(36px, 5vw, 52px);
      line-height: 1;
      font-weight: 700;
    }

    .title-group .difference {
      color: var(--deletion);
    }

    .title-group .han.difference {
      transform: translateX(4px);
    }

    .title-group .union {
      color: var(--addition);
    }

    .subtitle-group {
      margin-top: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .tagline {
      margin: 0;
      font-size: clamp(28px, 3.6vw, 44px);
      line-height: 1.4;
      font-weight: 600;
    }

    .translation {
      font-size: clamp(17px, 2.4vw, 26px);
      font-weight: 400;
      color: var(--muted);
      font-style: italic;
    }

    @media (max-width: 760px) {
      body {
        padding: 20px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .mark {
        min-height: 240px;
        border-right: 0;
        border-bottom: 1px solid var(--stroke);
      }

      .content {
        padding: 32px 24px;
      }

    }
  </style>
</head>
<body>
  <main class="logo">
    <section class="hero">
      <div class="mark">
        <div class="glyph" aria-hidden="true">
          <svg
            class="tile-mark"
            viewBox="0 0 540 540"
            xmlns="http://www.w3.org/2000/svg"
            xmlns:xlink="http://www.w3.org/1999/xlink"
          >
            <g transform="translate(270,270)">
              <circle r="250" fill="var(--deletion)"/>
              <circle r="230" fill="var(--tile-white)"/>
              <circle r="222" fill="var(--addition)"/>
              <g id="a2">
                <g id="a1">
                  <ellipse cy="150" rx="19" ry="69" fill="var(--tile-white)"/>
                  <path d="M3,0L3,193A3,3 180 0 1 -3,193L-3,0z" fill="var(--addition)"/>
                </g>
                <use xlink:href="#a1" transform="rotate(15)"/>
                <use xlink:href="#a1" transform="rotate(30)"/>
                <use xlink:href="#a1" transform="rotate(45)"/>
                <use xlink:href="#a1" transform="rotate(60)"/>
                <use xlink:href="#a1" transform="rotate(75)"/>
              </g>
              <use xlink:href="#a2" transform="rotate(90)"/>
              <use xlink:href="#a2" transform="rotate(180)"/>
              <use xlink:href="#a2" transform="rotate(270)"/>
              <circle r="152" fill="var(--addition)"/>
              <circle r="139" fill="var(--tile-white)"/>
              <circle r="128" fill="var(--deletion)"/>
              <g id="a3">
                <path d="M54.56,-83.09A12,12 60 0 0 54.56,-94.5A63,63 120 0 0 -54.56,-94.5A12,12 60 0 0 -54.56,-83.09L0,-8z" fill="var(--tile-white)"/>
                <path d="M6,0L6,-103A6,6 180 0 0 -6,-103L-6,0z" fill="var(--deletion)"/>
                <circle cy="-103" r="9" fill="var(--deletion)"/>
                <path id="a4" transform="rotate(18)" d="M4,0L4,-90A4,4 180 0 0 -4,-90L-4,0z" fill="var(--deletion)"/>
                <use xlink:href="#a4" transform="scale(-1,1)"/>
              </g>
              <use xlink:href="#a3" transform="rotate(72)"/>
              <use xlink:href="#a3" transform="rotate(144)"/>
              <use xlink:href="#a3" transform="rotate(-144)"/>
              <use xlink:href="#a3" transform="rotate(-72)"/>
              <circle r="53" fill="var(--deletion)"/>
              <circle r="46" fill="var(--tile-white)"/>
              <circle r="34" fill="var(--deletion)"/>
            </g>
          </svg>
        </div>
      </div>
      <div class="content">
        <div class="title-group">
          <span class="latin difference">Yi</span>
          <span class="latin union">Tong</span>
          <span class="han difference">异</span>
          <span class="han union">同</span>
        </div>
        <div class="subtitle-group">
          <p class="tagline">析其所异，合其所同。</p>
          <span class="translation">Analyze what differs, unite what is shared.</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
