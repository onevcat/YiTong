<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YiTong Logo</title>
  <style>
    :root {
      --paper: #f6f1e8;
      --ink: #141414;
      --muted: #665f57;
      --addition: #1d9b63;
      --addition-soft: #dff5e9;
      --deletion: #d14b57;
      --deletion-soft: #fde6e8;
      --stroke: rgba(20, 20, 20, 0.12);
      --shadow: 0 24px 60px rgba(20, 20, 20, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, rgba(29, 155, 99, 0.16), transparent 30%),
        radial-gradient(circle at bottom right, rgba(209, 75, 87, 0.16), transparent 28%),
        linear-gradient(180deg, #fcfaf5 0%, #eee6da 100%);
      color: var(--ink);
      font-family: "SF Pro Display", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      padding: 32px;
    }

    .logo {
      width: min(920px, 100%);
      border-radius: 32px;
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(260px, 340px) 1fr;
      gap: 0;
      min-height: 360px;
    }

    .mark {
      position: relative;
      background:
        linear-gradient(145deg, rgba(29, 155, 99, 0.16) 0%, rgba(29, 155, 99, 0.02) 36%, rgba(209, 75, 87, 0.02) 64%, rgba(209, 75, 87, 0.16) 100%);
      border-right: 1px solid var(--stroke);
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .glyph {
      width: 200px;
      aspect-ratio: 1;
      position: relative;
      display: grid;
      place-items: center;
    }

    .rail {
      position: absolute;
      width: 72px;
      height: 164px;
      border-radius: 28px;
      top: 18px;
      box-shadow: inset 0 0 0 1px rgba(20, 20, 20, 0.06);
    }

    .rail.minus {
      left: 24px;
      background: linear-gradient(180deg, var(--deletion-soft) 0%, rgba(209, 75, 87, 0.12) 100%);
    }

    .rail.plus {
      right: 24px;
      background: linear-gradient(180deg, var(--addition-soft) 0%, rgba(29, 155, 99, 0.12) 100%);
    }

    .symbol {
      position: absolute;
      width: 72px;
      height: 72px;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 40px;
      font-weight: 700;
      line-height: 1;
      top: 66px;
    }

    .symbol.minus {
      left: 24px;
      background: var(--deletion);
      color: white;
    }

    .symbol.plus {
      right: 24px;
      background: var(--addition);
      color: white;
    }

    .merge {
      display: none;
    }

    .content {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 44px 48px;
      gap: 16px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0.94)),
        repeating-linear-gradient(
          180deg,
          rgba(20, 20, 20, 0.015) 0,
          rgba(20, 20, 20, 0.015) 1px,
          transparent 1px,
          transparent 36px
        );
    }

    .title-group {
      display: inline-grid;
      grid-template-columns: auto auto;
      column-gap: 10px;
      row-gap: 6px;
      align-items: end;
      justify-content: start;
      justify-items: center;
    }

    .title-group .latin {
      font-size: clamp(44px, 7vw, 84px);
      line-height: 0.96;
      letter-spacing: -0.03em;
      font-weight: 600;
      font-family: "Optima", "Avenir Next", "Helvetica Neue", sans-serif;
    }

    .title-group .han {
      font-size: clamp(30px, 4vw, 44px);
      line-height: 1;
      font-weight: 700;
    }

    .title-group .difference {
      color: var(--deletion);
    }

    .title-group .union {
      color: var(--addition);
    }

    blockquote {
      margin: 12px 0 0;
      padding: 18px 20px;
      border-left: 5px solid var(--ink);
      border-radius: 0 18px 18px 0;
      background: rgba(20, 20, 20, 0.04);
      font-size: clamp(20px, 2.6vw, 32px);
      line-height: 1.4;
      font-weight: 600;
    }

    @media (max-width: 760px) {
      body {
        padding: 20px;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .mark {
        min-height: 240px;
        border-right: 0;
        border-bottom: 1px solid var(--stroke);
      }

      .content {
        padding: 32px 24px;
      }

      blockquote {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <main class="logo">
    <section class="hero">
      <div class="mark">
        <div class="glyph" aria-hidden="true">
          <div class="rail minus"></div>
          <div class="rail plus"></div>
          <div class="symbol minus">-</div>
          <div class="symbol plus">+</div>
          <div class="merge"></div>
        </div>
      </div>
      <div class="content">
        <div class="title-group">
          <span class="latin difference">Yi</span>
          <span class="latin union">Tong</span>
          <span class="han difference">异</span>
          <span class="han union">同</span>
        </div>
        <blockquote>析其所异，合其所同。</blockquote>
      </div>
    </section>
  </main>
</body>
</html>
